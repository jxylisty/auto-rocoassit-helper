# 洛克王国 PVP 助手配置文件

# 截图配置
capture:
  fps: 30
  region:
    left: 0
    top: 0
    width: 1920
    height: 1080

# 战斗配置
battle:
  auto_throw_ball: true
  charge_time_min: 0.6
  charge_time_max: 1.0

# 状态机配置
fsm:
  battle_timeout: 300  # 战斗超时（秒）
  wait_timeout: 60     # 匹配超时（秒）

# GUI配置
gui:
  width: 800
  height: 600
  theme: dark